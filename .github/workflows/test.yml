name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wincorp-bragi
        uses: actions/checkout@v4
        with:
          path: wincorp-bragi

      - name: Checkout wincorp-urd (sibling pour check-sync)
        uses: actions/checkout@v4
        with:
          repository: tanfeuille/wincorp-urd
          path: wincorp-urd
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: wincorp-bragi/package-lock.json

      - name: Install dependencies
        working-directory: wincorp-bragi
        run: npm ci

      - name: Check sync with urd
        working-directory: wincorp-bragi
        run: npm run check-sync

      - name: Lint
        working-directory: wincorp-bragi
        run: npm run lint

      - name: Test
        working-directory: wincorp-bragi
        run: npm test

      - name: Build
        working-directory: wincorp-bragi
        run: npm run build
